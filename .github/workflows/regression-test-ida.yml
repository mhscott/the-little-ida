name: GitHub Actions workflow for running IDA on multiple OpenSeesPy versions

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  run-ida:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        openseespy-version:
          - "3.5.1.2"
          - "3.5.1.12"
          - "3.6.0.3"
          - "3.7.0.6"
          - "3.7.1.2"
          - "latest"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python libraries
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup OpenSeesPy
        uses: mhscott/setup-openseespy@v1
        with:
          version: ${{ matrix.openseespy-version }}

      - name: Run Little IDA
        run: |
          python little-ida.py

      - name: Upload plot
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: |
            little-ida-${{ matrix.openseespy-version }}.png
